<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Seats</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Facebook Pixel -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1252040857081560');
    fbq('track', 'PageView');
    </script>
</head>
<body class="mobile-layout bg-white">
    <header class="bms-header">
        <div class="header-left">
            <span class="back-icon" onclick="window.history.back()">&#8249;</span>
            <h1 id="seat-match-title" class="truncate-title">Loading...</h1>
        </div>
    </header>

    <!-- VIEW 1: Quantity Selection -->
    <div id="qty-view">
        <div class="timer-banner">
            You have <strong>approximately 4 minutes</strong> to select your seats.
        </div>
        <div class="stadium-bg"></div>
        
        <div class="qty-container">
            <h2>How many seats?</h2>
            <div class="cycle-img">
                <img src="https://in.bmscdn.com/webin/common/icons/bicycle.png" alt="Bicycle" style="width: 180px; margin: 20px auto; display: block;">
            </div>
            
            <div class="qty-bubbles" id="qty-bubbles">
                <!-- 1 to 10 bubbles injected by JS -->
            </div>
            
            <div class="info-pill">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                You can add upto 10 tickets.
            </div>

            <div class="bottom-fixed-btn">
                <button id="proceed-to-seats" class="btn-primary">Select Seats</button>
            </div>
        </div>
    </div>

    <!-- VIEW 2: Seat Layout Map -->
    <div id="seat-view" style="display: none;">
        <main class="container">
            <div class="seat-legend">
                <div class="legend-item"><div class="seat available"></div> Available</div>
                <div class="legend-item"><div class="seat locked"></div> Selected</div>
                <div class="legend-item"><div class="seat booked"></div> Sold</div>
            </div>

            <div class="screen-indicator">
                <div class="screen-curve"></div>
                <span>PITCH THIS WAY</span>
            </div>

            <div id="seat-map" class="seat-grid"></div>
        </main>

        <div class="sticky-footer" id="checkout-bar" style="display: none;">
            <div class="price-info">
                <div class="price" id="total-price">₹0</div>
                <div class="status" id="seat-count-label" style="color:#666; font-weight:normal;">0 Seats</div>
            </div>
            <button id="pay-now-btn" class="book-now-btn">Pay Now</button>
        </div>
    </div>

    <!-- Payment Success Modal -->
    <div id="success-modal" class="modal">
        <div class="modal-content text-center">
            <div class="success-icon">✓</div>
            <h3>Booking Confirmed!</h3>
            <p>Your tickets have been successfully booked.</p>
            <button onclick="window.location.href='index.html'" class="btn-primary" style="margin-top:20px;">Back to Home</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
