// Inside seats.html <script type="module">
import { db, ref, onValue, update } from './js/firebase.js';

const matchId = new URLSearchParams(window.location.search).get('id');
const timerEl = document.getElementById('timer');
let timeLeft = 240; // 4 minutes

function startTimer() {
    const countdown = setInterval(() => {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timerEl.innerText = `You have approximately ${m}:${s < 10 ? '0'+s : s} minutes to select your seats.`;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Session Expired");
            location.href = 'index.html';
        }
        timeLeft--;
    }, 1000);
}

// Real-time seat update
onValue(ref(db, `seats/${matchId}`), (snapshot) => {
    const seats = snapshot.val() || {};
    renderSeatMap(seats);
});

async function toggleSeat(seatId, currentStatus) {
    if (currentStatus === 'booked') return;
    
    const newStatus = currentStatus === 'selected' ? 'available' : 'selected';
    await update(ref(db, `seats/${matchId}/${seatId}`), {
        status: newStatus,
        timestamp: Date.now()
    });
    
    if(newStatus === 'selected') {
        fbq('track', 'AddToCart', { currency: 'INR', value: 1200 });
    }
}
